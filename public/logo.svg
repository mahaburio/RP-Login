<svg width="400" height="340" viewBox="0 0 340 300" fill="none" xmlns="http://www.w3.org/2000/svg">

<defs>
  <!-- Top line gradient -->
  <linearGradient id="gradTop" x1="0" y1="170" x2="330" y2="170" gradientUnits="userSpaceOnUse">
    <stop offset="0%" stop-color="white" stop-opacity="0"/>
    <stop offset="50%" stop-color="white" stop-opacity="1"/>
    <stop offset="100%" stop-color="white" stop-opacity="0"/>
  </linearGradient>

  <!-- Bottom line gradient -->
  <linearGradient id="gradBottom" x1="0" y1="258" x2="340" y2="258" gradientUnits="userSpaceOnUse">
    <stop offset="0%" stop-color="white" stop-opacity="0"/>
    <stop offset="50%" stop-color="white" stop-opacity="1"/>
    <stop offset="100%" stop-color="white" stop-opacity="0"/>
  </linearGradient>
</defs>

<!-- RP Circle (center adjusted) -->
<circle cx="170" cy="80" r="60" fill="none" stroke="#ffffff" stroke-width="2"/>
<circle cx="170" cy="80" r="54" fill="none" stroke="#ffffff" stroke-width="1"/>

<!-- RP Text -->
<text x="170" y="100" font-size="52" font-weight="600" fill="#ffffff"
  text-anchor="middle" font-family="serif" letter-spacing="4">
  RP
</text>

<!-- Top Divider (340 width) -->
<line x1="0" y1="170" x2="150" y2="170" stroke="url(#gradTop)" stroke-width="1.5"/>
<rect x="166" y="166" width="8" height="8" fill="#ffffff" transform="rotate(45 170 170)"/>
<line x1="190" y1="170" x2="330" y2="170" stroke="url(#gradTop)" stroke-width="1.5"/>

<!-- PRIME -->
<text x="180" y="238" font-size="72" font-weight="600" fill="#ffffff"
  text-anchor="middle" font-family="serif" letter-spacing="24">
  PRIME
</text>

<!-- Bottom Divider (340 width) -->
<line x1="0" y1="258" x2="150" y2="258" stroke="url(#gradBottom)" stroke-width="1.5"/>
<rect x="166" y="254" width="8" height="8" fill="#ffffff" transform="rotate(45 170 258)"/>
<line x1="190" y1="258" x2="330" y2="258" stroke="url(#gradBottom)" stroke-width="1.5"/>

<!-- STEAK & SEAFOOD -->
<text x="170" y="290" font-size="16" font-weight="300" fill="#ffffff"
  text-anchor="middle" font-family="serif" letter-spacing="8">
  STEAK &amp; SEAFOOD
</text>

</svg>