<svg width="400" height="340" viewBox="0 0 300 300" fill="none" xmlns="http://www.w3.org/2000/svg">

  <defs>
    <!-- Top line gradient -->
    <linearGradient id="gradTop" x1="65" y1="170" x2="242" y2="170" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="white" stop-opacity="0"/>
      <stop offset="50%" stop-color="white" stop-opacity="1"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </linearGradient>

    <!-- Bottom line gradient -->
    <linearGradient id="gradBottom" x1="50" y1="258" x2="250" y2="258" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="white" stop-opacity="0"/>
      <stop offset="50%" stop-color="white" stop-opacity="1"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- RP Circle -->
  <circle cx="150" cy="80" r="60" fill="none" stroke="#ffffff" stroke-width="2"/>
  <circle cx="150" cy="80" r="54" fill="none" stroke="#ffffff" stroke-width="1"/>

  <!-- RP Text -->
  <text x="150" y="100" font-size="52" font-weight="600" fill="#ffffff" text-anchor="middle" font-family="serif" letter-spacing="4">
    RP
  </text>

  <!-- Top Divider -->
  <line x1="65" y1="170" x2="132" y2="170" stroke="url(#gradTop)" stroke-width="1.5"/>
  <rect x="146" y="166" width="8" height="8" fill="#ffffff" transform="rotate(45 150 170)"/>
  <line x1="166" y1="170" x2="242" y2="170" stroke="url(#gradTop)" stroke-width="1.5"/>

  <!-- PRIME -->
  <text x="160" y="238" font-size="72" font-weight="600" fill="#ffffff" text-anchor="middle" font-family="serif" letter-spacing="24">
    PRIME
  </text>

  <!-- Bottom Divider -->
  <line x1="50" y1="258" x2="132" y2="258" stroke="url(#gradBottom)" stroke-width="1.5"/>
  <rect x="146" y="254" width="8" height="8" fill="#ffffff" transform="rotate(45 150 258)"/>
  <line x1="168" y1="258" x2="250" y2="258" stroke="url(#gradBottom)" stroke-width="1.5"/>

  <!-- STEAK & SEAFOOD -->
  <text x="150" y="290" font-size="16" font-weight="300" fill="#ffffff" text-anchor="middle" font-family="serif" letter-spacing="8">
    STEAK &amp; SEAFOOD
  </text>

</svg>